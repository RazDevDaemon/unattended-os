# /etc/sysctl.d/99-hardened.conf
# Hardened kernel parameters

# ─── Network — Routing ────────────────────────────────────
# Disable packet forwarding — this is not a router
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# ─── Network — Redirects ──────────────────────────────────
# Disable ICMP redirect sending — we are not a router
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Disable ICMP redirect acceptance — prevent MITM route manipulation
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Disable secure ICMP redirects — still a redirect, still a risk
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# ─── Network — Spoofing ───────────────────────────────────
# Disable source routing — sender should not dictate packet path
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Log martian packets — impossible source addresses
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Reverse path filtering — drop packets that don't make routing sense
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# ─── Network — Attack mitigation ──────────────────────────
# Ignore broadcast pings — prevent Smurf amplification attacks
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# SYN flood protection
net.ipv4.tcp_syncookies = 1

# Disable TCP timestamps — prevents uptime fingerprinting
net.ipv4.tcp_timestamps = 0

# ─── Memory — ASLR ────────────────────────────────────────
# Full address space layout randomization
kernel.randomize_va_space = 2

# ─── Memory — Kernel info leaks ───────────────────────────
# Restrict kernel log to root only
kernel.dmesg_restrict = 1

# Hide kernel pointers — even from root
kernel.kptr_restrict = 2

# ─── Memory — Core dumps ──────────────────────────────────
# Disable core dumps for SUID processes
fs.suid_dumpable = 0

# Disable core dumps globally
kernel.core_pattern = |/bin/false

# ─── Filesystem ───────────────────────────────────────────
# Prevent hardlink privilege escalation
fs.protected_hardlinks = 1

# Prevent symlink privilege escalation
fs.protected_symlinks = 1

# Protect FIFOs in world-writable directories
fs.protected_fifos = 2

# Protect regular files in world-writable directories
fs.protected_regular = 2

# ─── Kernel subsystems ────────────────────────────────────
# Disable unprivileged BPF — significant attack surface
kernel.unprivileged_bpf_disabled = 1

# Restrict perf subsystem to root only
kernel.perf_event_paranoid = 3

# Disable TTY line discipline autoloading
dev.tty.ldisc_autoload = 0

# Disable unprivileged user namespaces — common container escape vector
kernel.unprivileged_userns_clone = 0

# Restrict ptrace — prevent process inspection across users
kernel.yama.ptrace_scope = 2